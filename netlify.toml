[build]
  command = "yarn build"
  publish = "Frontend/build"

[[plugins]]
  package = "netlify-plugin-fetch-feeds"
  [plugins.inputs]
    # Required by netlify-plugin-fetch-feeds.
    # Keep this as an empty list unless/until real feed URLs are needed.
    dataDir = "Frontend/build/feeds"
    feeds = "[]"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
